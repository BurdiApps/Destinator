{% extends "base.html" %}
{% block title %}{{ action }} Driver | Destinator Admin{% endblock %}
{% block page_title %}{{ action }} Driver{% endblock %}

{% block content %}
<div class="panel form-panel">
    <form method="POST" class="crud-form">
        <div class="form-grid">
            <div class="form-group">
                <label for="name">Driver Name</label>
                <input type="text" name="name" id="name"
                       value="{{ driver.name if driver else '' }}" required>
            </div>
            <div class="form-group">
                <label for="vehicle">Vehicle</label>
                <input type="text" name="vehicle" id="vehicle"
                       value="{{ driver.vehicle if driver else '' }}" required>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-accent">{{ action }} Driver</button>
            <a href="{{ url_for('list_drivers') }}" class="btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
